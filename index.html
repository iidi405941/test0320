<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotto Number Recommendation</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <button id="theme-toggle">🌙 Switch to Dark</button>
    
    <div class="container">
        <h1>Lotto Number Recommendation</h1>
        <button id="generate-btn">Generate Numbers</button>
        <div id="numbers-container"></div>
        
        <div class="nav-links">
            <a href="animal-test.html" class="nav-btn">🐶 동물상 테스트 하러가기 🐱</a>
        </div>
    </div>

    <div class="container contact-section">
        <h2>Affiliate Inquiry</h2>
        <form action="https://formspree.io/f/mvzwyoge" method="POST">
            <div class="form-group">
                <label for="name">Name</label>
                <input type="text" id="name" name="name" required placeholder="Your Name">
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="_replyto" required placeholder="your@email.com">
            </div>
            <div class="form-group">
                <label for="subject">Subject</label>
                <input type="text" id="subject" name="subject" required placeholder="Inquiry Subject">
            </div>
            <div class="form-group">
                <label for="message">Message</label>
                <textarea id="message" name="message" rows="5" required placeholder="Tell us more about your inquiry..."></textarea>
            </div>
            <button type="submit">Send Message</button>
        </form>
    </div>
    <script src="main.js"></script>
</body>
</html>
